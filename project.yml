name: VibeMeetings
options:
  bundleIdPrefix: com.vibe
  deploymentTarget:
    macOS: "15.0"
  createIntermediateGroups: true
  developmentLanguage: en

settings:
  base:
    SWIFT_VERSION: "6.0"
    SWIFT_STRICT_CONCURRENCY: complete
    MACOSX_DEPLOYMENT_TARGET: "15.0"
    GENERATE_INFOPLIST_FILE: NO
    ENABLE_HARDENED_RUNTIME: YES
    DEAD_CODE_STRIPPING: YES
    CODE_SIGN_STYLE: Automatic
    CODE_SIGN_IDENTITY: "-"

packages:
  VMCore:
    path: Packages/VMCore
  VMRecording:
    path: Packages/VMRecording
  VMTranscription:
    path: Packages/VMTranscription
  VMSummarization:
    path: Packages/VMSummarization
  VMStorage:
    path: Packages/VMStorage
  VMCalendar:
    path: Packages/VMCalendar

targets:
  VibeMeetings:
    type: application
    platform: macOS
    deploymentTarget: "15.0"
    sources:
      - path: VibeMeetings
        excludes:
          - "Info.plist"
          - "VibeMeetings.entitlements"
    info:
      path: VibeMeetings/Info.plist
    entitlements:
      path: VibeMeetings/VibeMeetings.entitlements
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.vibe.meetings
        PRODUCT_NAME: "vibe-meetings"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: YES
        DEVELOPMENT_ASSET_PATHS: "\"VibeMeetings/Preview Content\""
    dependencies:
      - package: VMCore
      - package: VMRecording
      - package: VMTranscription
      - package: VMSummarization
      - package: VMStorage
      - package: VMCalendar
